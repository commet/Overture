# Overture plugin config template.
# Copy to `.overture/config.yaml` in your repo and customize.
# Schema: data/schemas/config.json
#
# On first `/overture:sail` invocation, if .overture/config.yaml is missing, the
# skill offers to create one from this template via AskUserQuestion.

locale: ko  # or "en"

boss:
  mbti_code: ISTJ  # Must match an entry in data/boss-types.yaml. See choices:
                   # ISTJ, ISFJ, INFJ, INTJ, ISTP, ISFP, INFP, INTP,
                   # ESTP, ESFP, ENFP, ENTP, ESTJ, ESFJ, ENFJ, ENTJ
  name: "박 팀장"
  gender: 남       # "남" | "여" (KR) or "male" | "female" (EN)
  role: "팀장"     # Free-form role label

team:
  # Optional overrides. Omit unless you need them.
  # max_agents_override: 3
  # preferred_agents: [donghyuk, jieun]

archive:
  commit_sessions: false  # If true, /overture:chart suggests git commit at phase=complete
