# Overture Agent Registry — Plugin Data Source of Truth
#
# Source: extracted from webapp's src/lib/agent-registry.ts + worker-personas.ts +
# agent-capabilities.ts + orchestrator-framework.ts (2026-04-24).
#
# One-way sync: webapp is canonical. When webapp changes, regenerate this file
# via scripts/extract-from-webapp.md procedure. Plugin does NOT modify this file
# based on plugin-side usage — it's read-only reference data.
#
# Structure per agent:
#   id                 — canonical agentId (matches webapp)
#   persona_id         — skill/framework key (often same as role archetype)
#   framework_key      — key into framework_priority table
#   name               — {ko, en} display names
#   role               — {ko, en} role labels
#   emoji, color       — UI/identity markers
#   chain              — research | strategy | production | validation | special
#   chain_position     — rank within chain (1 = entry/junior, higher = senior)
#   expertise, tone    — {ko, en} — injected into agent system prompt
#   capabilities       — taskTypes / domains / outputTypes / antiPatterns (from agent-capabilities.ts)
#   frameworks         — preferred thinking frameworks per decision type
#   keywords_match     — task routing hint (LLM runtime classification reference)
#   voice_markers      — distinctive phrases the agent uses (3-5; M2 personality anchor)
#   worker_mode_examples — 2 example dialogues in WORKER MODE (doing work, not critiquing)
#                          M9 gate: examples MUST show agent producing a concrete artifact
#                          in their voice. "Critic of plan X" style is old 4R — forbidden.
#   completion_notes   — what agent says when finishing a task (tone anchor)

version: 1
source_commit: "main@2026-04-24"

