          셋 다 "기능" 차이만 봤지 "사용자 투입 시간"을 비교 안 했습니다.
          우리 제품 differentiation은 여기예요 — 기능이 아닌 시간 투자도.
          부가 발견: 셋 다 enterprise tier 가격을 안 뽑았음. 팔로업 필요.
